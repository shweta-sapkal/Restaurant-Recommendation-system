<!DOCTYPE html>
<html>
<head>
    <title>Search Restaurant</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9e58, #f8a7ce);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 500px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            font-weight: 700;
            margin-bottom: 20px;
        }

        input {
            height: 50px;
            border-radius: 10px !important;
        }

        button {
            border-radius: 10px !important;
            height: 50px;
            font-weight: bold;
        }

        .btn-recommend {
            background: linear-gradient(45deg, #ff4d4d, #ff944d);
            color: white;
            border: none;
        }

        .btn-recommend:hover {
            opacity: 0.9;
        }

        .btn-home {
            background: #6c757d;
            color: white;
        }

        .icon {
            font-size: 40px;
        }
    </style>
</head>

<body>

<div class="search-box">

    <div class="icon">🍽️</div>

    <h2>Find Restaurants</h2>

    <form action="/recommend" method="post">
        <input type="text" name="restaurant" class="form-control mb-3" placeholder="Type restaurant name..." required>

        <button type="submit" class="btn btn-recommend w-100 mb-2">🔍 Recommend</button>
    </form>

    <a href="/" class="btn btn-home w-100">🏠 Back Home</a>

</div>

</body>
</html>
